// --- INPUT ---
// P2 physical ’ virtual key translation (maps to P1-equivalent key names)
const P2MAP={
  'KeyI':'ArrowUp','KeyK':'ArrowDown','KeyJ':'ArrowLeft','KeyL':'ArrowRight',
  'KeyU':'KeyA','KeyO':'KeyS','KeyH':'KeyZ','KeyN':'KeyX','KeyY':'KeyD','KeyB':'KeyC'
};
const Input={
  keys:new Set(),jp:new Set(),
  p2keys:new Set(),p2jp:new Set(),
  init(){
    addEventListener('keydown',e=>{
      if(!this.keys.has(e.code))this.jp.add(e.code);this.keys.add(e.code);
      const v=P2MAP[e.code];if(v){if(!this.p2keys.has(v))this.p2jp.add(v);this.p2keys.add(v);}
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyI','KeyJ','KeyK','KeyL'].includes(e.code))e.preventDefault();
    });
    addEventListener('keyup',e=>{this.keys.delete(e.code);const v=P2MAP[e.code];if(v)this.p2keys.delete(v);});
  },
  end(){this.jp.clear();this.p2jp.clear();},
  is(c){return this.keys.has(c)},p(c){return this.jp.has(c)}
};

// --- MOTION BUFFER ---
class MotionBuf{
  constructor(){this.frame=0;this.last={fwd:0,bk:0,dn:0,up:0};this.chargeB=0;this.chargeD=0;}
  update(keys,jp,facingRight){
    this.frame++;
    const fk=facingRight?'ArrowRight':'ArrowLeft',bk=facingRight?'ArrowLeft':'ArrowRight';
    if(jp.has(fk))this.last.fwd=this.frame;
    if(jp.has(bk))this.last.bk=this.frame;
    if(jp.has('ArrowDown'))this.last.dn=this.frame;
    if(jp.has('ArrowUp'))this.last.up=this.frame;
    this.chargeB=keys.has(bk)?this.chargeB+1:0;
    this.chargeD=keys.has('ArrowDown')?this.chargeD+1:0;
  }
  // “ then ’ : forward pressed after down, within window
  qcf(win=32){const d=this.last.dn,f=this.last.fwd;return f>d&&d>0&&f>0&&(this.frame-f)<12&&(f-d)<win;}
  // “ then  : back pressed after down
  qcb(win=32){const d=this.last.dn,b=this.last.bk;return b>d&&d>0&&b>0&&(this.frame-b)<12&&(b-d)<win;}
  // ’ then “ while still holding ’ : forward first, then down, fwd still held
  dp(keys,fr){const fk=fr?'ArrowRight':'ArrowLeft',d=this.last.dn,f=this.last.fwd;return f>0&&d>f&&d>0&&(this.frame-d)<16&&keys.has(fk);}
  cbf(keys,fr){const fwdKey=fr?'ArrowRight':'ArrowLeft';return this.chargeB>=40&&keys.has(fwdKey);}
  cdu(jp){return this.chargeD>=40&&jp.has('ArrowUp');}
  s360(win=36){const f=this.frame,l=this.last;
    const mn=Math.min(l.fwd,l.bk,l.dn,l.up),mx=Math.max(l.fwd,l.bk,l.dn,l.up);
    return mn>0&&(f-mx)<win&&(mx-mn)<win*2;}
}

// --- AUDIO ---
const Snd=(()=>{let ac=null;
  function g(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return ac;}
  function b(fr,dur,t='square',v=0.13){
    const c=g();if(!c)return;
    const o=c.createOscillator(),gn=c.createGain();
    o.connect(gn);gn.connect(c.destination);
    o.type=t;o.frequency.value=fr;
    gn.gain.setValueAtTime(v,c.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);
  }
  return{
    hit(){b(160,0.07,'sawtooth',0.18);},
    block(){b(100,0.09,'square',0.13);},
    special(){b(300,0.04);setTimeout(()=>b(500,0.09),40);},
    ko(){b(220,0.08);setTimeout(()=>b(160,0.08),90);setTimeout(()=>b(100,0.3),180);},
    sel(){b(440,0.06,'sine',0.1);},
    fight(){b(280,0.04);setTimeout(()=>b(400,0.04),50);setTimeout(()=>b(560,0.14),100);},
    proj(){b(340,0.1,'sawtooth',0.1);},
  };
})();

// --- PROJECTILE ---
class Projectile{
  constructor(x,y,dir,data,owner,dmg){
    this.x=x;this.y=y;this.vx=data.spd*dir;
    this.w=data.w;this.h=data.h;this.col=data.col;
    this.life=data.life||120;this.dmg=dmg;
    this.owner=owner;this.dead=false;
  }
  update(){this.x+=this.vx;this.life--;if(this.life<=0||this.x<-50||this.x>W+50)this.dead=true;}
  hb(){return{x:this.x-this.w/2,y:this.y-this.h/2,w:this.w,h:this.h};}
}

// --- FIGHTER ---
class Fighter{
  constructor(def,sx,face){
    this.def=def;this.x=sx;this.y=FLOOR;this.vx=0;this.vy=0;
    this.face=face;this.ground=true;this.crouch=false;this.block=false;
    this.hp=def.stats.hp;this.maxhp=def.stats.hp;
    this.as='idle';this.af=0;this.at=0;
    this.md=null;this.mf=0;this.mp='';this.mhit=false;this.mhc=0;
    this.hs=0;this.bs=0;this.inv=false;
    this.mb=new MotionBuf();
    this.spawnProj=null;
  }

  input(keys,jp,opp){
    const fr=this.face===1;
    this.mb.update(keys,jp,fr); // always update ” allows pre-buffering during recovery
    if(this.hs>0||this.bs>0||this.md)return;

    const pp=jp.has('KeyA')||jp.has('KeyS');
    const pk=jp.has('KeyZ')||jp.has('KeyX');

    // D/C instant special shortcuts
    if(this.ground&&jp.has('KeyD')&&this.def.specials[0]){this.startSpec(this.def.specials[0]);return;}
    if(this.ground&&jp.has('KeyC')&&this.def.specials[1]){this.startSpec(this.def.specials[1]);return;}

    if(this.trySpec(pp,pk,keys,jp,fr))return;

    const dn=keys.has('ArrowDown');
    this.crouch=dn&&this.ground;
    if(!this.ground){
      if(pp){this.startMv(this.def.moves.jp);return;}
      if(pk){this.startMv(this.def.moves.jk);return;}
    }
    if(this.crouch){
      if(pp){this.startMv(this.def.moves.clp);return;}
      if(pk){this.startMv(this.def.moves.chk);return;}
    }
    if(jp.has('KeyA')){this.startMv(this.def.moves.lp);return;}
    if(jp.has('KeyS')){this.startMv(this.def.moves.hp);return;}
    if(jp.has('KeyZ')){this.startMv(this.def.moves.lk);return;}
    if(jp.has('KeyX')){this.startMv(this.def.moves.hk);return;}

    const fwdKey=fr?'ArrowRight':'ArrowLeft',bkKey=fr?'ArrowLeft':'ArrowRight';
    const fwd=keys.has(fwdKey),bk=keys.has(bkKey);
    const up=keys.has('ArrowUp');
    this.block=bk&&this.ground;
    if(up&&this.ground){this.vy=this.def.stats.jf;this.ground=false;this.crouch=false;}
    if(!this.crouch){
      if(fwd)this.vx=this.def.stats.spd*this.face;
      else if(bk)this.vx=-this.def.stats.spd*this.face*0.72;
      else this.vx*=0.68;
    }else this.vx*=0.55;
  }

  trySpec(pp,pk,keys,jp,fr){
    for(const sp of this.def.specials){
      const m=sp.mot;
      const bp=sp.btn==='p'?pp:pk;
      let ok=false;
      if(m==='QCF')  ok=bp&&this.mb.qcf();
      else if(m==='QCB')ok=bp&&this.mb.qcb();
      else if(m==='DP') ok=bp&&this.mb.dp(keys,fr);
      else if(m==='360')ok=bp&&this.mb.s360()&&this.ground;
      else if(m==='CBF')ok=bp&&this.mb.cbf(keys,fr);
      else if(m==='CDU')ok=bp&&this.mb.cdu(jp);
      if(ok&&(this.ground||sp.air)){this.startSpec(sp);return true;}
    }
    return false;
  }

  startMv(m){
    if(!m)return;
    this.md=m;this.mf=0;this.mp='su';this.mhit=false;this.mhc=0;
    this.vx=0;
    this.setAs('atk');
  }

  startSpec(sp){
    this.md=sp;this.mf=0;this.mp='su';this.mhit=false;this.mhc=0;
    if(sp.inv)this.inv=true;
    this.vx=0;
    this.setAs('spec');
    Snd.special();
  }

  setAs(s){this.as=s;this.af=0;this.at=0;}

  tickAnim(){
    const dur={idle:7,walk:5,jump:8,crouch:4,block:5,hit:5,atk:3,spec:3}[this.as]||5;
    if(++this.at>=dur){this.at=0;this.af++;
      const loop=this.as==='idle'||this.as==='walk';
      if(this.af>=8)this.af=loop?0:7;
    }
  }

  tickMove(){
    if(!this.md)return;
    this.mf++;
    const sp=this.md,su=sp.startup||sp.su||8,ac=sp.active||sp.ac||0,re=sp.recovery||sp.re||12;
    if(this.mf<=su)this.mp='su';
    else if(this.mf<=su+ac){
      if(this.mp!=='ac'){this.mp='ac';this.mhc=0;}
      if(sp.mvx)this.vx=sp.mvx*this.face;
      if(sp.proj&&this.mf===su+1){
        this.spawnProj={x:this.x+this.face*48,y:this.y-68,dir:this.face,data:sp.proj,dmg:sp.dmg};
      }
    }else if(this.mf<=su+ac+re){
      this.mp='re';this.vx*=0.78;if(this.inv)this.inv=false;
    }else{
      this.md=null;this.mp='';this.inv=false;this.mhc=0;
    }
  }

  hb(){
    if(this.mp!=='ac'||!this.md)return null;
    const h=this.md.hb||this.md.hitbox;if(!h)return null;
    return{x:this.x+this.face*h.ox-h.w/2,y:this.y-h.oy-h.h/2,w:h.w,h:h.h};
  }

  hurt(){
    if(this.crouch)return{x:this.x-24,y:this.y-78,w:48,h:78};
    return{x:this.x-24,y:this.y-132,w:48,h:132};
  }

  hit(dmg,kb,aface,isBlock,hs){
    if(this.inv)return false;
    if(isBlock&&this.block){
      this.hp=Math.max(0,this.hp-Math.floor(dmg*0.08));
      this.bs=hs||12;this.vx=-kb*aface*0.4;
      R.blockSpark((this.x+300*this.face),this.y-60);
      Snd.block();return false;
    }
    this.hp=Math.max(0,this.hp-dmg);
    this.hs=hs||18;this.vx=kb*aface*0.9;
    this.md=null;this.mp='';this.inv=false;
    this.setAs('hit');Snd.hit();return true;
  }

  update(opp){
    if(this.hs>0){if(--this.hs===0&&this.as==='hit')this.setAs('idle');}
    if(this.bs>0)this.bs--;
    this.tickMove();
    if(!this.ground)this.vy=Math.min(this.vy+GRAV*this.def.stats.wt,TVEL);
    this.x+=this.vx;this.y+=this.vy;
    if(this.y>=FLOOR){this.y=FLOOR;this.vy=0;if(!this.ground){this.vx*=0.45;this.ground=true;if(this.as==='jump')this.setAs('idle');}}
    this.x=Math.max(LWALL,Math.min(RWALL,this.x));
    if(!this.md&&this.hs===0)this.face=opp.x>this.x?1:-1;
    if(!this.md&&this.hs===0&&this.bs===0){
      if(!this.ground){if(this.as!=='jump')this.setAs('jump');}
      else if(this.crouch){if(this.as!=='crouch')this.setAs('crouch');}
      else if(this.block&&this.bs>0){if(this.as!=='block')this.setAs('block');}
      else if(Math.abs(this.vx)>0.5){if(this.as!=='walk')this.setAs('walk');}
      else if(this.as==='walk'||this.as==='jump')this.setAs('idle');
    }
    this.tickAnim();
  }
}

// --- AI CONTROLLER ---
class AI{
  constructor(f,opp,diff){
    this.f=f;this.opp=opp;
    const base=f.def.ai;
    this.p=diff?{style:base.style,ti:diff.ti,bc:diff.bc}:base;
    this.tt=0;this.ck=new Set();this.cjp=new Set();
  }
  keys(){return this.ck;}
  jp2(){return this.cjp;}

  update(){
    this.cjp.clear();
    if(++this.tt<this.p.ti)return;
    this.tt=0;this.think();
  }

  think(){
    if(this.f.md||this.f.hs>0)return;
    const dist=Math.abs(this.f.x-this.opp.x);
    const fr=this.f.face===1;
    const fk=fr?'ArrowRight':'ArrowLeft',bk=fr?'ArrowLeft':'ArrowRight';
    const r=Math.random();
    this.ck.clear();
    if(this.opp.mp==='ac'&&dist<160&&r<this.p.bc){this.ck.add(bk);return;}
    const s=this.p.style;
    if(s==='rush'){
      if(dist>260)this.ck.add(fk);
      else if(dist>120){
        if(r<0.32)this.ck.add(fk);
        else if(r<0.58)this.doAtk(dist);
        else if(r<0.76)this.doSpec();
        else this.ck.add(fk);
      }else{
        if(r<0.48)this.doAtk(dist);
        else if(r<0.72)this.doSpec();
        else this.ck.add(fk);
      }
    }else if(s==='grab'){
      if(dist>210)this.ck.add(fk);
      else if(dist>85){
        if(r<0.44)this.doSpec();
        else this.ck.add(fk);
      }else{
        if(r<0.58)this.doSpec();
        else this.doAtk(dist);
      }
    }else{
      if(dist<165){this.ck.add(bk);if(r<0.32)this.doAtk(dist);}
      else if(dist<360){
        if(r<0.48)this.doSpec();
        else if(r<0.66)this.doAtk(dist);
        else this.ck.add(bk);
      }else{
        if(r<0.60)this.doSpec();
        else this.ck.add(fk);
      }
    }
  }

      this.ptcls.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,

    }
    if(big){this.shX=6;this.shY=5;this.shD=12;}else{this.shX=2.5;this.shY=2;this.shD=6;}
  },

  tickPtcl(){
    this.ptcls=this.ptcls.filter(p=>p.life>0);
    for(const p of this.ptcls){p.x+=p.vx;p.y+=p.vy;p.vy+=0.30;p.life--;}
    if(this.shD>0)this.shD--;else{this.shX*=0.5;this.shY*=0.5;}

    if(isP)ctx.fillRect(x,y,BW*pct,5);
    else ctx.fillRect(x+BW*(1-pct),y,BW*pct,5);
    ctx.strokeStyle='#FFFFFF';ctx.lineWidth=2;ctx.strokeRect(x,y,BW,BH);

    const p2label=G.mode==='2P'?(isP?' (P1)':' (P2)'):'';

  // ”” BRYAN ””””””””””””””””””””””””””””””””””””””””””””””””””””

  // ”” CHARLOTTE ””””””””””””””””””””””””””””””””””””””””””””””””
  charlotte(ctx,f){

    const cr=f.crouch?1:0;const crH=cr*26;
    const punchExt=isAc&&f.md&&(f.md===f.def.moves.lp||f.md===f.def.moves.clp)?Math.min(mf*10,38):0;

    const hkickRaise=isHK?Math.min(mf*0.16,0.82):0;
    const isJK=isAc&&f.md&&f.md===f.def.moves.jk;
    const jkickRaise=isJK?Math.min(mf*0.17,1.1):0;
    const legAlt=walking?Math.sin(fr*1.5):0;
    const armSwing=walking?Math.sin(fr*1.5):0;

    const ltPh=lightning&&(mf%4)<2;

    // ”” Drawing helpers ””
    const blLimb=(topW,botW,h,dark)=>{
      const g=ctx.createLinearGradient(-topW/2,0,topW/2,0);
      if(dark){g.addColorStop(0,'#1A4A99');g.addColorStop(0.4,'#2266BB');g.addColorStop(1,'#1A4A99');}

    };
    const chCalf=()=>{
      const g=ctx.createLinearGradient(-11,0,11,0);
      g.addColorStop(0,'#D4D4D4');g.addColorStop(0.4,'#F2F2F2');g.addColorStop(1,'#D0D0D0');

      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.moveTo(-9,0);ctx.lineTo(-3,0);ctx.lineTo(-3,6);ctx.lineTo(-9,6);ctx.closePath();ctx.fill();

  // ”” ARNOLD ”””””””””””””””””””””””””””””””””””””””””””””””””””

  // ”” DARK LORD ””””””””””””””””””””””””””””””””””””””””””””””””
  darklord(ctx,f){
    const fr=f.af,st=f.as,mf=f.mf,mp=f.mp;

    const dlForearm=(ext)=>{

  vs(ctx,pd,od,fightIdx){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    ctx.save();ctx.globalAlpha=0.12;

      const rayX2=W/2+Math.cos(angle)*400,rayY2=H/2+Math.sin(angle)*300;

      rayGrad.addColorStop(0,'rgba(200,100,255,0.8)');rayGrad.addColorStop(1,'rgba(200,100,255,0)');
      ctx.fillStyle=rayGrad;
      ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(rayX2,rayY2);ctx.lineTo(rayX2+50,rayY2+50);ctx.closePath();ctx.fill();
    }

    ctx.restore();
    const p1Phase=Math.max(0,G.vstimer-50)/30;
    const p1X=W/4+Math.max(0,-100*(1-p1Phase));
    ctx.save();ctx.globalAlpha=Math.min(1,p1Phase*2);
    ctx.font='bold 82px monospace';
    ctx.fillStyle='#FFF';
    ctx.textAlign='center';
    ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=20;
    ctx.fillText(pd.name.toUpperCase(),p1X,H/2-50);
    ctx.shadowBlur=0;ctx.restore();
    const p2Phase=Math.max(0,G.vstimer-55)/30;
    const p2X=3*W/4+Math.max(0,100*(1-p2Phase));
    ctx.save();ctx.globalAlpha=Math.min(1,p2Phase*2);
    ctx.font='bold 82px monospace';
    ctx.fillStyle='#FF4444';
    ctx.textAlign='center';
    ctx.shadowColor='rgba(255,68,68,0.5)';ctx.shadowBlur=20;
    ctx.fillText(od.name.toUpperCase(),p2X,H/2-50);
    ctx.shadowBlur=0;ctx.restore();
    const vsPhase=Math.max(0,G.vstimer-30)/50;
    const vsPulse=Math.sin(G.vstimer*0.15)*0.2+1;
    const vsAlpha=Math.min(1,(G.vstimer-20)/15);

    ctx.font='bold 82px monospace';ctx.textAlign='center';
    ctx.shadowColor='#FFEE00';ctx.shadowBlur=30;

    ctx.fillStyle='#FFEE00';ctx.fillText('VS',W/2,H/2+28);

  roundEnd(ctx,res,rt){

          ctx.fillStyle=rayCol+rayA+')';
          ctx.beginPath();ctx.moveTo(cx,cy);
          ctx.lineTo(cx+Math.cos(ang-0.17)*340,cy+Math.sin(ang-0.17)*340);
          ctx.lineTo(cx+Math.cos(ang+0.17)*340,cy+Math.sin(ang+0.17)*340);
          ctx.closePath();ctx.fill();

      G.confettiSpawned=true;
    }
    if(is2P){
      const winner=won?pd:od,label=won?'P1':'P2';
      ctx.font='bold 24px monospace';ctx.fillStyle='#FFCC00';
      ctx.fillText(`${label}: ${winner.name.toUpperCase()} WINS!`,W/2,265);
      ctx.fillStyle='rgba(0,200,80,0.14)';ctx.fillRect(W/2-178,388,356,42);
      ctx.strokeStyle='#00CC55';ctx.lineWidth=2;ctx.shadowColor='#00CC55';ctx.shadowBlur=8;
      ctx.strokeRect(W/2-178,388,356,42);ctx.shadowBlur=0;
      ctx.font='bold 18px monospace';ctx.fillStyle='#44FF88';
      ctx.fillText('[ ENTER / U ]   ─   REMATCH',W/2,416);
      ctx.fillStyle='rgba(255,140,0,0.12)';ctx.fillRect(W/2-192,442,384,42);
      ctx.strokeStyle='#FF8800';ctx.lineWidth=2;ctx.shadowColor='#FF8800';ctx.shadowBlur=8;
      ctx.strokeRect(W/2-192,442,384,42);ctx.shadowBlur=0;
      ctx.font='bold 18px monospace';ctx.fillStyle='#FFAA44';
      ctx.fillText('[ BKSP / O ]   ─   CHARACTER SELECT',W/2,470);
    }else{
      if(won&&fightIdx>=2){
        ctx.font='bold 26px monospace';ctx.fillStyle='#FFCC00';ctx.fillText('CAMPAIGN COMPLETE!',W/2,262);
        ctx.font='16px monospace';ctx.fillStyle='#AA9900';ctx.fillText('You have conquered all challengers!',W/2,296);
      }else{
        ctx.font='bold 22px monospace';ctx.fillStyle='#CCC';
        ctx.fillText((won?pd.name:od.name).toUpperCase()+' WINS THE MATCH!',W/2,262);
      }
      if(Math.floor(t/28)%2===0){ctx.font='17px monospace';ctx.fillStyle='#888';ctx.fillText('PRESS ENTER TO CONTINUE',W/2,455);}
    }
    ctx.textAlign='left';
  },

  contScreen(ctx,timer,od){
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#1A0000');g.addColorStop(1,'#050000');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const pulse=Math.sin(G.tick*0.12)*0.5+0.5;
    ctx.strokeStyle=`rgba(255,0,0,${pulse*0.8})`;ctx.lineWidth=5;ctx.shadowColor='rgba(255,0,0,0.8)';ctx.shadowBlur=20;
    ctx.strokeRect(12,12,W-24,H-24);ctx.shadowBlur=0;
    ctx.font='bold 72px monospace';ctx.textAlign='center';
    const flashPhase=Math.sin(G.tick*0.15);
    ctx.strokeStyle='#440000';ctx.lineWidth=10;ctx.strokeText('CONTINUE?',W/2,165);
    ctx.fillStyle=flashPhase>0?'#FF5555':'#FF2222';ctx.fillText('CONTINUE?',W/2,165);
    const secs=Math.max(0,Math.ceil(timer/60));
    ctx.font='bold 130px monospace';
    const scale=1+Math.sin(G.tick*0.2)*0.1;
    ctx.save();ctx.translate(W/2,322);ctx.scale(scale,scale);ctx.translate(-W/2,-322);
    ctx.strokeStyle='#220000';ctx.lineWidth=16;ctx.strokeText(secs,W/2,322);
    ctx.fillStyle=secs<=3?'#FF0000':secs<=5?'#FF6600':'#FF7700';ctx.fillText(secs,W/2,322);
    ctx.restore();
    if((timer%60)<10){ctx.fillStyle=`rgba(255,0,0,${(1-(timer%60)/10)*0.3})`;ctx.fillRect(0,0,W,H);}
    ctx.font='bold 18px monospace';ctx.fillStyle='#FFF';ctx.fillText('PRESS ENTER TO CONTINUE',W/2,394);
    ctx.font='14px monospace';ctx.fillStyle='#664444';
    ctx.fillText('Next opponent: '+od.name.toUpperCase(),W/2,432);
    ctx.textAlign='left';
  },
  comboDisplay(ctx,combo,t){
    if(combo<2)return;
    const x=W/2-72,y=H-44;
    const scale=1+Math.sin(t*0.12)*0.15;
    const glow=Math.sin(t*0.08)*0.5+0.5;
    ctx.save();ctx.translate(x+80,y);ctx.scale(scale,scale);ctx.translate(-(x+80),-y);
    ctx.font='bold 21px monospace';ctx.fillStyle='#FFEE00';
    ctx.shadowColor='#FFAA00';ctx.shadowBlur=20*glow;
    ctx.fillText(combo+' HIT COMBO!',x,y);ctx.shadowBlur=0;
    let textColor='#FFEE00';if(combo>=10)textColor='#FF6600';if(combo>=15)textColor='#FF0000';if(combo>=20)textColor='#FF00FF';
    ctx.fillStyle=textColor;ctx.fillText(combo+' HIT COMBO!',x,y);ctx.restore();
  },

  blockSpark(x,y){
    const n=9;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
      this.ptcls.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:16,ml:16,col:'#00CCFF',sz:2+Math.random()*3.5});
    }
    this.shX=3;this.shY=2;this.shD=5;
  },
  screenWipe(ctx,phase,direction){
    ctx.save();ctx.globalAlpha=0.9;
    if(direction==='iris'){const radius=Math.sqrt(W*W+H*H)*phase;ctx.fillStyle='#000';ctx.beginPath();ctx.arc(W/2,H/2,radius,0,Math.PI*2);ctx.fill();}
    else if(direction==='horizontal'){const wipeX=W*phase;ctx.fillStyle='#000';ctx.fillRect(0,0,wipeX,H);}
    else if(direction==='vertical'){const wipeY=H*phase;ctx.fillStyle='#000';ctx.fillRect(0,0,W,wipeY);}
    ctx.restore();
  },

  victoryPose(ctx,f,t){
    ctx.save();ctx.translate(f.x,f.y);ctx.scale(f.face,1);
    const raiseAmount=Math.sin(t*0.06)*15;
    ctx.fillStyle='#FFFF00';ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(-20,-120+raiseAmount,30,0,Math.PI*2);ctx.fill();
    ctx.restore();
  },

};

// --- GAME STATE MACHINE ---
const G={
  
  confettiSpawned:false,state:'TITLE',tick:0,cur:0,
  pd:null,od:null,p:null,o:null,ai:null,
  projs:[],rnum:1,pw:0,ow:0,
  rt:99,rtms:0,ftxt:null,ftimer:0,vstimer:0,
  res:null,retimer:0,combo:0,lastHitter:null,
  fightIdx:0,opponents:[],contTimer:0,won:false,
  mode:'1P',p2cur:1,p1locked:false,p2locked:false,

  set(s){this.state=s;this.tick=0;},

  setupCampaign(pid){
    const seq={
      bryan:['charlotte','arnold','darklord'],
      charlotte:['arnold','bryan','darklord'],
      arnold:['charlotte','bryan','darklord'],
      darklord:['charlotte','arnold','bryan'],
    };
    this.opponents=seq[pid].map(id=>CHARS[id]);
    this.fightIdx=0;
  },

  aiDifficulty(){
    const base=this.od.ai;
    if(this.fightIdx===0)return{ti:Math.round(base.ti*1.9),bc:base.bc*0.4};
    if(this.fightIdx===1)return{ti:Math.round(base.ti*1.25),bc:base.bc*0.72};
    return null;
  },

  nextFight(){
    this.fightIdx++;
    this.od=this.opponents[this.fightIdx];
    this.pw=0;this.ow=0;this.rnum=1;
    this.vstimer=80;this.set('VS');
  },

  fight(){
    this.p=new Fighter(this.pd,200,1);
    this.o=new Fighter(this.od,600,-1);
    this.ai=this.mode==='1P'?new AI(this.o,this.p,this.aiDifficulty()):null;
    this.projs=[];this.rt=99;this.rtms=0;this.combo=0;this.lastHitter=null;
    this.ftxt='ROUND '+this.rnum;this.ftimer=90;
    this.set('FIGHT');Snd.fight();
  },

  endRound(res){
    G.confettiSpawned=false;const draw=res==='time'&&this.p.hp===this.o.hp;
    const won=draw?null:res==='ko'?(this.o.hp<=0):(this.p.hp>this.o.hp);
    const perf=!draw&&((won&&this.p.hp===this.p.maxhp)||(!won&&this.o.hp===this.o.maxhp));
    if(!draw){if(won)this.pw++;else this.ow++;}
    this.res=draw?'draw':(perf&&won)?'perfect':res;
    if(res==='ko'){
      const loser=this.o.hp<=0?this.o:this.p;
      for(let i=0;i<30;i++){
        const a=(i/30)*Math.PI*2,s=4+Math.random()*9;
        R.ptcls.push({x:loser.x,y:loser.y-60,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,
          life:32,ml:32,col:['#FF6600','#FF8800','#FFAA00','#FFFFFF'][Math.floor(Math.random()*4)],sz:4+Math.random()*6});
      }
      R.shX=9;R.shY=7;R.shD=18;
    }
    this.retimer=130;this.set('REND');Snd.ko();
  },

  chkEnd(){
    if(this.p.hp<=0){this.endRound('ko');return true;}
    if(this.o.hp<=0){this.endRound('ko');return true;}
    if(this.rt<=0){this.endRound('time');return true;}
    return false;
  },

  hits(){
    const test=(atk,def)=>{
      const m=atk.md;
      if(!m||atk.mp!=='ac')return;
      if(atk.mhit&&!m.mh)return;
      if(m.mh&&atk.mhc>=m.mh)return;
      const ahb=atk.hb();if(!ahb)return;
      const dhb=def.hurt();
      if(ahb.x<dhb.x+dhb.w&&ahb.x+ahb.w>dhb.x&&ahb.y<dhb.y+dhb.h&&ahb.y+ahb.h>dhb.y){
        atk.mhit=true;if(m.mh)atk.mhc++;
        const dmg=Math.round((m.dmg||m.damage||60)/(m.mh||1));
        const kb=m.kb||m.knockback||4;
        const isBlk=!m.grab&&def.block&&atk.face!==def.face;
        const hs=m.hitstun||(m.su||10)+4;
        const landed=def.hit(dmg,kb,atk.face,isBlk,hs);
        if(m.launch&&landed){def.vy=-10;def.ground=false;}
        if(landed){
          R.spark((atk.x+def.x)/2,def.y-62,dmg>80);
          if(this.lastHitter===atk)this.combo++;else{this.combo=1;this.lastHitter=atk;}
        }
      }
    };
    test(this.p,this.o);test(this.o,this.p);

    for(const pr of this.projs){
      if(pr.dead)continue;
      const tgt=pr.owner===this.p?this.o:this.p;
      const dhb=tgt.hurt(),phb=pr.hb();
      if(phb.x<dhb.x+dhb.w&&phb.x+phb.w>dhb.x&&phb.y<dhb.y+dhb.h&&phb.y+phb.h>dhb.y){
        pr.dead=true;
        const isBlk=tgt.block&&(pr.vx>0)!==tgt.face===1;
        tgt.hit(pr.dmg,3,pr.vx>0?1:-1,isBlk,14);
        R.spark(pr.x,pr.y,false);
      }
    }
    for(let i=0;i<this.projs.length;i++){
      for(let j=i+1;j<this.projs.length;j++){
        const a=this.projs[i],b=this.projs[j];
        if(a.dead||b.dead||a.owner===b.owner)continue;
        const ah=a.hb(),bh=b.hb();
        if(ah.x<bh.x+bh.w&&ah.x+ah.w>bh.x&&ah.y<bh.y+bh.h&&ah.y+ah.h>bh.y){
          a.dead=true;b.dead=true;R.spark((a.x+b.x)/2,(a.y+b.y)/2,true);
        }
      }
    }
  },

  update(dt){
    this.tick++;
    if(this.state==='TITLE'){
      if(Input.p('Enter')){this.mode='1P';this.set('CSEL');Snd.sel();}
      if(Input.p('Digit2')||Input.p('KeyP')){this.mode='2P';this.cur=0;this.p2cur=1;this.p1locked=false;this.p2locked=false;this.set('CSEL');Snd.sel();}
    }else if(this.state==='CSEL'){
      if(this.mode==='1P'){
        if(Input.p('ArrowLeft')){this.cur=(this.cur+3)%4;Snd.sel();}
        if(Input.p('ArrowRight')){this.cur=(this.cur+1)%4;Snd.sel();}
        if(Input.p('Enter')){
          this.pd=CHARS[ORDER[this.cur]];
          this.setupCampaign(this.pd.id);
          this.od=this.opponents[0];
          this.pw=0;this.ow=0;this.rnum=1;
          this.vstimer=80;this.set('VS');Snd.fight();
        }
      }else{
        // 2P simultaneous char select
        if(!this.p1locked){
          if(Input.p('ArrowLeft')){this.cur=(this.cur+3)%4;Snd.sel();}
          if(Input.p('ArrowRight')){this.cur=(this.cur+1)%4;Snd.sel();}
          if(Input.p('Enter')){this.p1locked=true;Snd.sel();}
        }
        if(!this.p2locked){
          if(Input.p2jp.has('ArrowLeft')){this.p2cur=(this.p2cur+3)%4;Snd.sel();}
          if(Input.p2jp.has('ArrowRight')){this.p2cur=(this.p2cur+1)%4;Snd.sel();}
          if(Input.p2jp.has('KeyA')){this.p2locked=true;Snd.sel();} // U key
        }
        if(this.p1locked&&this.p2locked){
          this.pd=CHARS[ORDER[this.cur]];
          this.od=CHARS[ORDER[this.p2cur]];
          this.pw=0;this.ow=0;this.rnum=1;
          this.vstimer=80;this.set('VS');Snd.fight();
        }
      }
    }else if(this.state==='VS'){
      if(--this.vstimer<=0)this.fight();
    }else if(this.state==='FIGHT'){
      if(this.ftimer>0){
        if(--this.ftimer===55&&this.ftxt==='ROUND '+this.rnum)this.ftxt='FIGHT!';
        if(this.ftimer===0)this.ftxt=null;
      }
      this.rtms+=dt;if(this.rtms>=1000){this.rtms-=1000;this.rt=Math.max(0,this.rt-1);}
      const dx=this.p.x-this.o.x;
      if(Math.abs(dx)<PUSH){const psh=(PUSH-Math.abs(dx))*0.5+0.8;
        this.p.x+=dx>0?psh:-psh;this.o.x+=dx>0?-psh:psh;
        this.p.x=Math.max(LWALL,Math.min(RWALL,this.p.x));
        this.o.x=Math.max(LWALL,Math.min(RWALL,this.o.x));
      }
      if(this.mode==='1P'){
        this.ai.update();
        this.p.input(Input.keys,Input.jp,this.o);
        this.o.input(this.ai.keys(),this.ai.jp2(),this.p);
      }else{
        this.p.input(Input.keys,Input.jp,this.o);
        this.o.input(Input.p2keys,Input.p2jp,this.p);
      }
      for(const f of[this.p,this.o]){
        if(f.spawnProj){const s=f.spawnProj;f.spawnProj=null;
          this.projs.push(new Projectile(s.x,s.y,s.dir,s.data,f,s.dmg));Snd.proj();}
      }
      this.p.update(this.o);this.o.update(this.p);
      this.hits();
      for(const pr of this.projs)pr.update();
      this.projs=this.projs.filter(p=>!p.dead);
      R.tickPtcl();
      this.chkEnd();
    }else if(this.state==='REND'){
      R.tickPtcl();
      if(--this.retimer<=0){
        if(this.mode==='2P'){
          if(this.pw>=2||this.ow>=2){this.won=this.pw>=2;this.set('END');}
          else{this.rnum++;this.fight();}
        }else{
          if(this.pw>=2){
            if(this.fightIdx>=2){this.won=true;this.set('END');}
            else this.nextFight();
          }else if(this.ow>=2){
            this.contTimer=600;this.set('CONT');
          }else{this.rnum++;this.fight();}
        }
      }
    }else if(this.state==='CONT'){
      if(--this.contTimer<=0){this.won=false;this.set('END');}
      if(Input.p('Enter')){this.pw=0;this.ow=0;this.rnum=1;this.fight();}
    }else if(this.state==='END'){
      if(this.mode==='2P'){
        if(Input.p('Enter')||Input.p2jp.has('KeyA')){
          // Rematch: same characters, replay VS screen
          this.pw=0;this.ow=0;this.rnum=1;this.vstimer=80;this.set('VS');Snd.fight();
        }else if(Input.p('Backspace')||Input.p('Escape')||Input.p('KeyO')||Input.p2jp.has('KeyS')){
          // Character select
          this.pw=0;this.ow=0;this.rnum=1;this.p1locked=false;this.p2locked=false;this.set('CSEL');
        }
      }else{
        if(Input.p('Enter')){
          this.set('TITLE');this.pw=0;this.ow=0;this.rnum=1;this.fightIdx=0;
        }
      }
    }
    Input.end();
  },

  render(ctx){
    ctx.clearRect(0,0,W*5,H*5);
    const sx=R.shD>0?(Math.random()-0.5)*R.shX*2:0;
    const sy=R.shD>0?(Math.random()-0.5)*R.shY*2:0;
    ctx.save();ctx.scale(5,5);ctx.translate(sx,sy);
    const s=this.state;
    if(s==='TITLE'){R.title(ctx,this.tick);}
    else if(s==='CSEL'){R.charsel(ctx,this.cur,this.tick);}
    else if(s==='VS'){R.vs(ctx,this.pd,this.od,this.fightIdx);}
    else if(s==='FIGHT'||s==='REND'){
      const stg=STAGES[this.od.stage]||STAGES.dojo;
      stg.draw(ctx,this.tick);
      R.shadow(ctx,this.p);R.shadow(ctx,this.o);
      for(const pr of this.projs)R.proj(ctx,pr);
      R.fighter(ctx,this.p);R.fighter(ctx,this.o);
      R.drawPtcl(ctx);
      R.hud(ctx,this.p,this.o,this.rt,this.pw,this.ow);
      R.comboDisplay(ctx,this.combo,this.tick);
      if(this.ftxt){const a=Math.min(1,this.ftimer/18);R.flash(ctx,this.ftxt,a,true);}
      if(s==='REND'){
        // White flash at KO ” instant bright, fades over 20 frames as retimer drops from 130’110
        if(this.res==='ko'||this.res==='perfect'){
          const flashA=Math.max(0,(this.retimer-110)/20);
          if(flashA>0){ctx.fillStyle=`rgba(255,255,255,${flashA*0.92})`;ctx.fillRect(0,0,W,H);}
        }
        const a=Math.min(1,(130-this.retimer)/14);
        ctx.fillStyle=`rgba(0,0,0,${a*0.55})`;ctx.fillRect(0,0,W,H);
        R.roundEnd(ctx,this.res,this.retimer);
      }
    }else if(s==='CONT'){
      R.contScreen(ctx,this.contTimer,this.od);
    }else if(s==='END'){
      const stg=STAGES[this.od.stage]||STAGES.dojo;stg.draw(ctx,this.tick);
      R.postMatch(ctx,this.won,this.pd,this.od,this.tick,this.fightIdx);
    }
    ctx.restore();
  },
};

// --- BOOTSTRAP ---
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
Input.init();
let lt=0;
function loop(ts){
  const dt=Math.min(ts-lt,50);lt=ts;
  G.update(dt);G.render(ctx);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
